
<!-- if user.is_authenticated is placed to remove navbar while in login.html -->
{% if user.is_authenticated %}

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

  <div class="container-fluid">

    <a class="navbar-brand me-5 " href="{% url 'home' %}">Django Register</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">

      <ul class="navbar-nav mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" href="{% url 'home' %}">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link active" href="{% url 'register' %}">Register</a>
        </li>

        <li class="nav-item">
          <a class="nav-link active" href="{% url 'members' %}">Members</a>
        </li>

      </ul>


      <div class="ms-auto d-flex align-items-center">

          <!--members tab will have the search bar -->
          {% if request.resolver_match.url_name == 'members' %}
          <form class="d-flex me-4" role="search">
            <input class="form-control" type="search" placeholder="Search" aria-label="Search"/>
            <button class="btn btn-outline-secondary" type="submit">Search</button>
          </form>
          {% endif %}

          <div>
              <a class="nav-link text-white me-4" href="{% url 'logout' %}">Logout</a>
          </div>

      </div>

    </div>
  </div>
</nav>


{% endif %}

{% block content  %}
{% endblock %}
